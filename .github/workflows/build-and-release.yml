name: Build Moderation Engine

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the UI

jobs:
  build:
    name: Build on Windows MSVC
    runs-on: windows-2022 # Crucial: GitHub provides Windows instances with full Visual Studio C++ Linkers pre-installed!

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable-x86_64-pc-windows-msvc

    - name: Cache Cargo Dependencies
      uses: Swatinem/rust-cache@v2

    - name: Build Release Engine (L1 / L2)
      run: cargo build --release
      
    - name: Upload Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: moderation_engine-windows-x64
        path: target/release/moderation_engine.exe
